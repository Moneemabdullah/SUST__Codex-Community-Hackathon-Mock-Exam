server {
    listen 80;
    server_name _;

    # Health endpoint — short-circuit, no upstream call needed if you have a
    # dedicated /livez. Here we proxy normally.
    location = /health {
        proxy_pass http://sust_prili_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Request-Id $request_id;
        access_log off;
    }

    location / {
        proxy_pass http://sust_prili_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_set_header Connection        "";

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 16 16k;
    }

    # Block noisy / dangerous defaults
    location ~* /\.(git|env|svn) { deny all; return 404; }
}